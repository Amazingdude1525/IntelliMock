<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliMock — AI Mock Interviews</title>
    <meta name="description" content="IntelliMock: AI-powered mock interviews that adapt to your level. Practice like it's real, get instant feedback, and land your dream job." />
    <meta property="og:title" content="IntelliMock — AI Mock Interviews" />
    <meta property="og:description" content="Practice like it's real. AI-powered mock interviews with instant feedback." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="grain-overlay" oncontextmenu="return false" onselectstart="return false">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Disable right-click inspect and keyboard shortcuts
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'u')) {
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
